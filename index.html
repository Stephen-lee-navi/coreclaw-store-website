<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreClaw Store - 网站导航</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 4rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5rem;
            color: #1f2123;
            margin-bottom: 1rem;
            text-align: center;
        }
        .subtitle {
            color: #6d7178;
            text-align: center;
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }
        .page-list {
            list-style: none;
        }
        .page-list li {
            margin-bottom: 1rem;
        }
        .page-list a {
            display: block;
            padding: 1.2rem 1.5rem;
            background: #f4f4f5;
            border-radius: 12px;
            color: #1672eb;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        .page-list a:hover {
            background: #ecf1ff;
            border-color: #1672eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(22, 114, 235, 0.2);
        }
        .page-list a::after {
            content: "";
            float: right;
            opacity: 0.5;
        }
        .footer {
            margin-top: 3rem;
            text-align: center;
            color: #6d7178;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CoreClaw Store</h1>
        <p class="subtitle">网络爬虫和自动化工具市场</p>
        <ul class="page-list">
            <li><a href="pages/test-page-one-merged.html">test-page-one-merged.html</a></li>
        </ul>
        <div class="footer">
            <p>后续可以在这里添加更多页面链接</p>
        </div>
    </div>
</body>
</html>
